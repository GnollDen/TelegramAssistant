version: "3.9"

# Legacy preview-only workload split template.
# Not used by the default deployment path and not part of the clean-slate baseline.
services:
  tga-ingest:
    image: ghcr.io/example/telegramassistant:latest
    container_name: tga-ingest-preview
    profiles: ["m1-preview"]
    network_mode: "host"
    env_file:
      - ../.env
    command: ["dotnet", "TgAssistant.Host.dll", "--runtime-role=ingest,ops"]
    restart: unless-stopped

  tga-stage5:
    image: ghcr.io/example/telegramassistant:latest
    container_name: tga-stage5-preview
    profiles: ["m1-preview"]
    network_mode: "host"
    env_file:
      - ../.env
    command: ["dotnet", "TgAssistant.Host.dll", "--runtime-role=stage5,maintenance"]
    restart: unless-stopped

  tga-stage6:
    image: ghcr.io/example/telegramassistant:latest
    container_name: tga-stage6-preview
    profiles: ["m1-preview"]
    network_mode: "host"
    env_file:
      - ../.env
    command: ["dotnet", "TgAssistant.Host.dll", "--runtime-role=stage6"]
    restart: unless-stopped

  tga-web:
    image: ghcr.io/example/telegramassistant:latest
    container_name: tga-web-preview
    profiles: ["m1-preview"]
    network_mode: "host"
    env_file:
      - ../.env
    environment:
      Web__Url: ${WEB_URL:-http://127.0.0.1:5078}
      Web__RequireOperatorAccessToken: ${WEB_REQUIRE_OPERATOR_ACCESS_TOKEN:-true}
      Web__OperatorAccessToken: ${WEB_OPERATOR_ACCESS_TOKEN:-}
      Web__AccessHeaderName: ${WEB_ACCESS_HEADER_NAME:-X-Tga-Operator-Key}
      Web__AccessCookieName: ${WEB_ACCESS_COOKIE_NAME:-tga_operator_key}
      Web__OperatorIdentity: ${WEB_OPERATOR_IDENTITY:-web-operator}
      Web__DefaultCaseId: ${WEB_DEFAULT_CASE_ID:-0}
      Web__DefaultChatId: ${WEB_DEFAULT_CHAT_ID:-0}
    command: ["dotnet", "TgAssistant.Host.dll", "--runtime-role=web,ops"]
    restart: unless-stopped

  tga-mcp:
    image: ghcr.io/example/telegramassistant-mcp:latest
    container_name: tga-mcp-preview
    profiles: ["m1-preview"]
    env_file:
      - ../.env
    depends_on: []
    restart: unless-stopped
