name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gnollden/tgassistant

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        run: |
          echo "image_ref=ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/tgassistant/TelegramAssistant

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u GnollDen --password-stdin

            # Keep VPS checkout deterministic and fail fast on git issues.
            git fetch origin master
            git checkout master
            git pull --ff-only origin master

            # Deploy immutable image built by this workflow run.
            export IMAGE_TAG="${{ needs.build.outputs.image_ref }}"
            docker pull "${IMAGE_TAG}"
            IMAGE_TAG="${IMAGE_TAG}" docker compose up -d --force-recreate --no-deps app

            # Post-deploy liveness checks.
            sleep 8
            docker compose ps app
            docker compose ps --status running --services | grep -qx app
            ! docker compose logs --since=2m app | grep -q "Application terminated unexpectedly"

            docker image prune -f
