services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tga-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tgassistant
      POSTGRES_USER: tgassistant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - /opt/tgassistant/data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgassistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tga-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - /opt/tgassistant/data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${IMAGE_TAG:-}
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-127.0.0.1,localhost,api.nuget.org,nuget.org,globalcdn.nuget.org}
    container_name: tga-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      Database__ConnectionString: "Host=127.0.0.1;Database=tgassistant;Username=tgassistant;Password=${POSTGRES_PASSWORD:-changeme}"
      Redis__ConnectionString: "127.0.0.1:6379"
      Telegram__ApiId: ${TG_API_ID}
      Telegram__ApiHash: ${TG_API_HASH}
      Telegram__PhoneNumber: ${TG_PHONE}
      Telegram__BotToken: ${TG_BOT_TOKEN}
      Telegram__OwnerUserId: ${TG_OWNER_ID}
      BotChat__OwnerId: ${BOTCHAT_OWNER_ID:-0}
      ContinuousRefinement__Enabled: ${CONTINUOUS_REFINEMENT_ENABLED:-false}
      ContinuousRefinement__PollIntervalSeconds: ${CONTINUOUS_REFINEMENT_POLL_INTERVAL_SECONDS:-300}
      ContinuousRefinement__BatchSize: ${CONTINUOUS_REFINEMENT_BATCH_SIZE:-10}
      ContinuousRefinement__MinMessageLength: ${CONTINUOUS_REFINEMENT_MIN_MESSAGE_LENGTH:-280}
      ContinuousRefinement__StaleAfterHours: ${CONTINUOUS_REFINEMENT_STALE_AFTER_HOURS:-168}
      ContinuousRefinement__MinDelaySeconds: ${CONTINUOUS_REFINEMENT_MIN_DELAY_SECONDS:-60}
      ContinuousRefinement__MaxDelaySeconds: ${CONTINUOUS_REFINEMENT_MAX_DELAY_SECONDS:-120}
      ContinuousRefinement__LowConfidenceThreshold: ${CONTINUOUS_REFINEMENT_LOW_CONFIDENCE_THRESHOLD:-0.7}
      Telegram__MonitoredChats: ${TG_MONITORED_CHATS}
      Gemini__ApiKey: ${GEMINI_API_KEY}
      Claude__ApiKey: ${CLAUDE_API_KEY}
      Media__StoragePath: /data/media
      Media__EnablePhotoBurstGuard: ${MEDIA_BURST_GUARD:-true}
      Media__PhotoBurstThreshold: ${MEDIA_BURST_THRESHOLD:-10}
      Media__PhotoBurstKeepCount: ${MEDIA_BURST_KEEP_COUNT:-2}
      Media__PhotoBurstWindowSeconds: ${MEDIA_BURST_WINDOW_SECONDS:-120}
      Media__VisionModel: ${MEDIA_VISION_MODEL:-qwen/qwen2.5-vl-72b-instruct}
      Media__ArchiveVisionModel: ${MEDIA_ARCHIVE_VISION_MODEL:-qwen/qwen2.5-vl-72b-instruct}
      Media__AudioModel: ${MEDIA_AUDIO_MODEL:-openai/gpt-audio-mini}
      VoiceParalinguistics__Enabled: ${VOICE_PARALINGUISTICS_ENABLED:-true}
      VoiceParalinguistics__TranscriptionEnabled: ${VOICE_PARALINGUISTICS_TRANSCRIPTION_ENABLED:-true}
      VoiceParalinguistics__DeleteSourceAudioAfterProcessing: ${VOICE_PARALINGUISTICS_DELETE_SOURCE_AUDIO_AFTER_PROCESSING:-true}
      VoiceParalinguistics__PollIntervalSeconds: ${VOICE_PARALINGUISTICS_POLL_INTERVAL_SECONDS:-10}
      VoiceParalinguistics__BatchSize: ${VOICE_PARALINGUISTICS_BATCH_SIZE:-30}
      VoiceParalinguistics__MaxParallel: ${VOICE_PARALINGUISTICS_MAX_PARALLEL:-2}
      VoiceParalinguistics__Model: ${VOICE_PARALINGUISTICS_MODEL:-openai/gpt-audio-mini}
      VoiceParalinguistics__MaxTokens: ${VOICE_PARALINGUISTICS_MAX_TOKENS:-300}
      VoiceParalinguistics__RetryCount: ${VOICE_PARALINGUISTICS_RETRY_COUNT:-2}
      VoiceParalinguistics__RetryBaseDelaySeconds: ${VOICE_PARALINGUISTICS_RETRY_BASE_DELAY_SECONDS:-2}
      VoiceParalinguistics__TransientBackoffBaseSeconds: ${VOICE_PARALINGUISTICS_TRANSIENT_BACKOFF_BASE_SECONDS:-60}
      VoiceParalinguistics__TransientBackoffMaxSeconds: ${VOICE_PARALINGUISTICS_TRANSIENT_BACKOFF_MAX_SECONDS:-900}
      ArchiveImport__Enabled: ${ARCHIVE_IMPORT_ENABLED:-false}
      ArchiveImport__MediaProcessingEnabled: ${ARCHIVE_MEDIA_PROCESSING_ENABLED:-true}
      ArchiveImport__RequireCostConfirmation: ${ARCHIVE_IMPORT_REQUIRE_CONFIRMATION:-true}
      ArchiveImport__ConfirmProcessing: ${ARCHIVE_IMPORT_CONFIRM_PROCESSING:-false}
      ArchiveImport__SourcePath: ${ARCHIVE_IMPORT_SOURCE_PATH:-/data/archive/result.json}
      ArchiveImport__MediaBasePath: ${ARCHIVE_IMPORT_MEDIA_BASE_PATH:-/data/archive}
      ArchiveImport__BatchSize: ${ARCHIVE_IMPORT_BATCH_SIZE:-500}
      ArchiveImport__MaxParallelMedia: ${ARCHIVE_IMPORT_MAX_PARALLEL_MEDIA:-10}
      ArchiveImport__RequestsPerMinute: ${ARCHIVE_IMPORT_RPM:-300}
      ArchiveImport__PollIntervalSeconds: ${ARCHIVE_IMPORT_POLL_INTERVAL_SECONDS:-5}
      ArchiveImport__MaxMediaFileSizeMb: ${ARCHIVE_IMPORT_MAX_MEDIA_SIZE_MB:-50}
      Backfill__Enabled: ${BACKFILL_ENABLED:-false}
      Backfill__SinceDate: ${BACKFILL_SINCE_DATE:-2026-03-07}
      Backfill__ChatIds: ${BACKFILL_CHAT_IDS:-}
      Analysis__Enabled: ${ANALYSIS_ENABLED:-false}
      Analysis__CheapModel: ${ANALYSIS_CHEAP_MODEL:-deepseek/deepseek-v3.2}
      Analysis__CheapModelAbEnabled: ${ANALYSIS_CHEAP_MODEL_AB_ENABLED:-false}
      Analysis__CheapBaselineModel: ${ANALYSIS_CHEAP_BASELINE_MODEL:-openai/gpt-4o-mini}
      Analysis__CheapCandidateModel: ${ANALYSIS_CHEAP_CANDIDATE_MODEL:-deepseek/deepseek-v3.2}
      Analysis__CheapAbCandidatePercent: ${ANALYSIS_CHEAP_AB_CANDIDATE_PERCENT:-50}
      Analysis__ExpensiveModel: ${ANALYSIS_EXPENSIVE_MODEL:-anthropic/claude-3.5-sonnet}
      Analysis__ExpensiveFallbackModel: ${ANALYSIS_EXPENSIVE_FALLBACK_MODEL:-openai/gpt-4o}
      Analysis__BatchSize: ${ANALYSIS_BATCH_SIZE:-8}
      Analysis__CheapBatchWorkers: ${ANALYSIS_CHEAP_BATCH_WORKERS:-1}
      Analysis__CheapLlmParallelism: ${ANALYSIS_CHEAP_LLM_PARALLELISM:-4}
      Analysis__CheapMaxTokens: ${ANALYSIS_CHEAP_MAX_TOKENS:-2000}
      Analysis__CheapProviderOrder: ${ANALYSIS_CHEAP_PROVIDER_ORDER:-}
      Analysis__CheapProviderAllowFallbacks: ${ANALYSIS_CHEAP_PROVIDER_ALLOW_FALLBACKS:-true}
      Analysis__PollIntervalSeconds: ${ANALYSIS_POLL_INTERVAL_SECONDS:-5}
      Analysis__MaxExpensivePerBatch: ${ANALYSIS_MAX_EXPENSIVE_PER_BATCH:-10}
      Analysis__ExpensiveDailyBudgetUsd: ${ANALYSIS_EXPENSIVE_DAILY_BUDGET_USD:-0.15}
      Analysis__HttpTimeoutSeconds: ${ANALYSIS_HTTP_TIMEOUT_SECONDS:-120}
      Analysis__ExpensiveCooldownMinutes: ${ANALYSIS_EXPENSIVE_COOLDOWN_MINUTES:-10}
      Analysis__ExpensiveContextMaxFacts: ${ANALYSIS_EXPENSIVE_CONTEXT_MAX_FACTS:-60}
      Analysis__ExpensiveContextMaxChars: ${ANALYSIS_EXPENSIVE_CONTEXT_MAX_CHARS:-12000}
      Analysis__CheapConfidenceThreshold: ${ANALYSIS_CHEAP_CONFIDENCE_THRESHOLD:-0.8}
      Analysis__MinFactConfidence: ${ANALYSIS_MIN_FACT_CONFIDENCE:-0.55}
      Analysis__MinSensitiveFactConfidence: ${ANALYSIS_MIN_SENSITIVE_FACT_CONFIDENCE:-0.75}
      Analysis__MinRelationshipConfidence: ${ANALYSIS_MIN_RELATIONSHIP_CONFIDENCE:-0.6}
      Analysis__TemporalFactSupersedeTtlHours: ${ANALYSIS_TEMPORAL_FACT_SUPERSEDE_TTL_HOURS:-12}
      Analysis__LocalBurstContextMessages: ${ANALYSIS_LOCAL_BURST_CONTEXT_MESSAGES:-6}
      Analysis__LocalBurstContextWindowMinutes: ${ANALYSIS_LOCAL_BURST_CONTEXT_WINDOW_MINUTES:-120}
      Analysis__SessionContextLookbackMessages: ${ANALYSIS_SESSION_CONTEXT_LOOKBACK_MESSAGES:-80}
      Analysis__SessionContextGapMinutes: ${ANALYSIS_SESSION_CONTEXT_GAP_MINUTES:-180}
      Analysis__SessionStartContextMessages: ${ANALYSIS_SESSION_START_CONTEXT_MESSAGES:-4}
      Analysis__HistoricalSummaryContextItems: ${ANALYSIS_HISTORICAL_SUMMARY_CONTEXT_ITEMS:-6}
      Analysis__SummaryEnabled: ${ANALYSIS_SUMMARY_ENABLED:-true}
      Analysis__SummaryModel: ${ANALYSIS_SUMMARY_MODEL:-openai/gpt-4o-mini}
      Analysis__SummaryPollIntervalSeconds: ${ANALYSIS_SUMMARY_POLL_INTERVAL_SECONDS:-30}
      Analysis__SummaryBatchSize: ${ANALYSIS_SUMMARY_BATCH_SIZE:-100}
      Analysis__SummaryDayMaxMessages: ${ANALYSIS_SUMMARY_DAY_MAX_MESSAGES:-500}
      Analysis__SummarySessionMaxMessages: ${ANALYSIS_SUMMARY_SESSION_MAX_MESSAGES:-120}
      Analysis__SummarySessionGapMinutes: ${ANALYSIS_SUMMARY_SESSION_GAP_MINUTES:-180}
      Analysis__SummaryMinMessages: ${ANALYSIS_SUMMARY_MIN_MESSAGES:-4}
      Analysis__SummaryMaxTokens: ${ANALYSIS_SUMMARY_MAX_TOKENS:-800}
      Analysis__EpisodicSessionGapMinutes: ${ANALYSIS_EPISODIC_SESSION_GAP_MINUTES:-120}
      Analysis__TestModeMaxSessionsPerChat: ${ANALYSIS_TEST_MODE_MAX_SESSIONS_PER_CHAT:-3}
      Merge__Enabled: ${MERGE_ENABLED:-true}
      Merge__PollIntervalSeconds: ${MERGE_POLL_INTERVAL_SECONDS:-60}
      Merge__MaxCandidatesPerRun: ${MERGE_MAX_CANDIDATES_PER_RUN:-500}
      Merge__SemanticGateEnabled: ${MERGE_SEMANTIC_GATE_ENABLED:-true}
      Merge__SemanticRejectSimilarityThreshold: ${MERGE_SEMANTIC_REJECT_SIMILARITY_THRESHOLD:-0.55}
      Merge__SemanticAutoMergeSimilarityThreshold: ${MERGE_SEMANTIC_AUTO_MERGE_SIMILARITY_THRESHOLD:-0.92}
      Merge__SemanticAutoMergeMinEvidence: ${MERGE_SEMANTIC_AUTO_MERGE_MIN_EVIDENCE:-2}
      Monitoring__Enabled: ${MONITORING_ENABLED:-true}
      Monitoring__PollIntervalSeconds: ${MONITORING_POLL_INTERVAL_SECONDS:-60}
      Maintenance__Enabled: ${MAINTENANCE_ENABLED:-true}
      Maintenance__FactDecayEnabled: ${MAINTENANCE_FACT_DECAY_ENABLED:-true}
      Maintenance__PollIntervalMinutes: ${MAINTENANCE_POLL_INTERVAL_MINUTES:-60}
      Maintenance__ExtractionErrorsRetentionDays: ${MAINTENANCE_EXTRACTION_ERRORS_RETENTION_DAYS:-14}
      Maintenance__Stage5MetricsRetentionDays: ${MAINTENANCE_STAGE5_METRICS_RETENTION_DAYS:-30}
      Maintenance__MergeDecisionsRetentionDays: ${MAINTENANCE_MERGE_DECISIONS_RETENTION_DAYS:-90}
      Neo4j__Enabled: ${NEO4J_ENABLED:-false}
      Neo4j__BaseUrl: ${NEO4J_BASE_URL:-http://127.0.0.1:7474}
      Neo4j__Username: ${NEO4J_USERNAME:-neo4j}
      Neo4j__Password: ${NEO4J_PASSWORD:-}
      Neo4j__Database: ${NEO4J_DATABASE:-neo4j}
      Neo4j__PollIntervalSeconds: ${NEO4J_POLL_INTERVAL_SECONDS:-30}
      Neo4j__BatchSize: ${NEO4J_BATCH_SIZE:-200}
      Embedding__Enabled: ${EMBEDDING_ENABLED:-true}
      Embedding__Model: ${EMBEDDING_MODEL:-text-embedding-3-small}
      Embedding__PollIntervalSeconds: ${EMBEDDING_POLL_INTERVAL_SECONDS:-30}
      Embedding__BatchSize: ${EMBEDDING_BATCH_SIZE:-100}
    volumes:
      - /opt/tgassistant/data/media:/data/media
      - /opt/tgassistant/data/telegram-session:/app/data
      - /opt/tgassistant/logs:/app/logs
      - /home/codex/projects/TelegramAssistant/archive:/data/archive
    network_mode: "host"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: tga-postgres-exporter
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://tgassistant:${POSTGRES_PASSWORD:-changeme}@postgres:5432/tgassistant?sslmode=disable"
    ports:
      - "127.0.0.1:9187:9187"

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: tga-redis-exporter
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "127.0.0.1:9121:9121"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: tga-prometheus
    restart: unless-stopped
    depends_on:
      postgres-exporter:
        condition: service_started
      redis-exporter:
        condition: service_started
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/tgassistant/data/prometheus:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana:11.1.4
    container_name: tga-grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      LLM_BUDGET_HOURLY_USD: ${LLM_BUDGET_HOURLY_USD:-0.50}
      LLM_BUDGET_DAILY_USD: ${LLM_BUDGET_DAILY_USD:-10.00}
    volumes:
      - /opt/tgassistant/data/grafana:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
