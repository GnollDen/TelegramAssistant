services:
  postgres:
    image: postgres:16-alpine
    container_name: tga-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tgassistant
      POSTGRES_USER: tgassistant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - /opt/tgassistant/data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgassistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tga-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - /opt/tgassistant/data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${IMAGE_TAG:-}
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: tga-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      Database__ConnectionString: "Host=127.0.0.1;Database=tgassistant;Username=tgassistant;Password=${POSTGRES_PASSWORD:-changeme}"
      Redis__ConnectionString: "127.0.0.1:6379"
      Telegram__ApiId: ${TG_API_ID}
      Telegram__ApiHash: ${TG_API_HASH}
      Telegram__PhoneNumber: ${TG_PHONE}
      Telegram__BotToken: ${TG_BOT_TOKEN}
      Telegram__OwnerUserId: ${TG_OWNER_ID}
      Telegram__MonitoredChats: ${TG_MONITORED_CHATS}
      Gemini__ApiKey: ${GEMINI_API_KEY}
      Claude__ApiKey: ${CLAUDE_API_KEY}
      Media__StoragePath: /data/media
      Media__EnablePhotoBurstGuard: ${MEDIA_BURST_GUARD:-true}
      Media__PhotoBurstThreshold: ${MEDIA_BURST_THRESHOLD:-10}
      Media__PhotoBurstKeepCount: ${MEDIA_BURST_KEEP_COUNT:-2}
      Media__PhotoBurstWindowSeconds: ${MEDIA_BURST_WINDOW_SECONDS:-120}
      ArchiveImport__Enabled: ${ARCHIVE_IMPORT_ENABLED:-false}
      ArchiveImport__MediaProcessingEnabled: ${ARCHIVE_MEDIA_PROCESSING_ENABLED:-true}
      ArchiveImport__RequireCostConfirmation: ${ARCHIVE_IMPORT_REQUIRE_CONFIRMATION:-true}
      ArchiveImport__ConfirmProcessing: ${ARCHIVE_IMPORT_CONFIRM_PROCESSING:-false}
      ArchiveImport__SourcePath: ${ARCHIVE_IMPORT_SOURCE_PATH:-/data/archive/result.json}
      ArchiveImport__MediaBasePath: ${ARCHIVE_IMPORT_MEDIA_BASE_PATH:-/data/archive}
      ArchiveImport__BatchSize: ${ARCHIVE_IMPORT_BATCH_SIZE:-500}
      ArchiveImport__MaxParallelMedia: ${ARCHIVE_IMPORT_MAX_PARALLEL_MEDIA:-2}
      ArchiveImport__RequestsPerMinute: ${ARCHIVE_IMPORT_RPM:-30}
      ArchiveImport__PollIntervalSeconds: ${ARCHIVE_IMPORT_POLL_INTERVAL_SECONDS:-5}
      ArchiveImport__MaxMediaFileSizeMb: ${ARCHIVE_IMPORT_MAX_MEDIA_SIZE_MB:-50}
    volumes:
      - /opt/tgassistant/data/media:/data/media
      - /opt/tgassistant/data/telegram-session:/app/data
      - /opt/tgassistant/logs:/app/logs
    network_mode: "host"
